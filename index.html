<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rates CSV → JS</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1.25rem;
      color: #222;
    }
    h1 { font-size: 1.25rem; margin-bottom: .25rem; }
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #ddd;
      margin-bottom: 1.25rem;
    }
    .tab {
      padding: .45rem 1.1rem;
      font-size: .9rem;
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      background: none;
      color: #555;
      margin-bottom: -2px;
    }
    .tab:hover { background: #f0f0f0; color: #222; }
    .tab.active {
      border-color: #ddd;
      background: #fff;
      color: #222;
      font-weight: 600;
    }
    label { display: block; font-weight: 600; margin-bottom: .4rem; }
    input[type="file"] { display: block; margin-bottom: 1rem; }
    .error {
      color: #c00;
      background: #fff0f0;
      border: 1px solid #fcc;
      padding: .5rem .75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    .meta {
      font-size: .875rem;
      color: #555;
      margin-bottom: .5rem;
    }
    textarea {
      width: 100%;
      height: 420px;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: .8125rem;
      line-height: 1.5;
      padding: .6rem .75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    textarea.zones { height: 300px; }
    .actions { margin-top: .6rem; display: flex; gap: .5rem; align-items: center; }
    button {
      padding: .4rem .9rem;
      font-size: .875rem;
      cursor: pointer;
      border: 1px solid #999;
      border-radius: 4px;
      background: #f5f5f5;
    }
    button:hover { background: #e8e8e8; }
    .copied { color: #080; font-size: .875rem; }
    .hint { font-size: .8rem; color: #777; margin: -.5rem 0 .75rem; }
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: #fff;
      border-radius: 6px;
      padding: 1.5rem;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .modal h2 { margin: 0 0 .75rem; font-size: 1rem; }
    .modal p { margin: 0; color: #555; font-size: .9rem; line-height: 1.6; }
    .modal-close {
      margin-top: 1.25rem;
      display: block;
      margin-left: auto;
    }
    .btn-help {
      margin-left: auto;
      border-radius: 50%;
      width: 1.75rem;
      height: 1.75rem;
      padding: 0;
      font-weight: 700;
      line-height: 1;
    }
  </style>
</head>
<body x-data="app()">
  <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.25rem;">
    <h1 style="margin:0;">Rates CSV → JS</h1>
    <button @click="reset()" x-show="rates.output || rates.error || zones.output || zones.error">Reset</button>
    <button class="btn-help" @click="help = true">?</button>
  </div>

  <!-- ── Help modal ── -->
  <div class="modal-backdrop" x-show="help" x-cloak @click.self="help = false" @keydown.escape.window="help = false">
    <div class="modal" role="dialog" aria-modal="true">
      <h2>Help</h2>
      <p>Placeholder help text. Describe how to use this tool here.</p>
      <button class="modal-close" @click="help = false">Close</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab" :class="{ active: tab === 'rates' }" @click="tab = 'rates'">Shipping Rates</button>
    <button class="tab" :class="{ active: tab === 'zones' }" @click="tab = 'zones'">USPS Zones</button>
  </div>

  <!-- ── Rates tab ── -->
  <div x-show="tab === 'rates'">
    <p class="hint">e.g. "Media Mail.csv" (single rate per weight) or "PM Retail.csv" / "USPS Ground Advantage Retail.csv" (rate per weight × zone)</p>
    <div>
      <label for="rates-file">Select rates CSV file:</label>
      <input id="rates-file" type="file" accept=".csv" @change="handleRatesFile($event)">
    </div>
    <div class="error" x-show="rates.error" x-text="rates.error"></div>
    <template x-if="rates.output">
      <div>
        <p class="meta" x-text="rates.meta"></p>
        <textarea readonly :value="rates.output"></textarea>
        <div class="actions">
          <button @click="copy(rates)">Copy to clipboard</button>
          <span class="copied" x-show="rates.copied">Copied!</span>
        </div>
      </div>
    </template>
  </div>

  <!-- ── Zones tab ── -->
  <div x-show="tab === 'zones'">
    <p class="hint">e.g. "usps-zones.csv" — ZIP Code,Zone rows; single prefixes or ranges like 006---009</p>
    <div>
      <label for="zones-file">Select zones CSV file:</label>
      <input id="zones-file" type="file" accept=".csv" @change="handleZonesFile($event)">
    </div>
    <div class="error" x-show="zones.error" x-text="zones.error"></div>
    <template x-if="zones.output">
      <div>
        <p class="meta" x-text="zones.meta"></p>
        <textarea class="zones" readonly :value="zones.output"></textarea>
        <div class="actions">
          <button @click="copy(zones)">Copy to clipboard</button>
          <span class="copied" x-show="zones.copied">Copied!</span>
        </div>
      </div>
    </template>
  </div>

  <script>
    function app() {
      return {
        tab: 'rates',
        help: false,
        rates: { output: '', meta: '', error: '', copied: false },
        zones: { output: '', meta: '', error: '', copied: false },

        handleRatesFile(e) {
          const file = e.target.files[0];
          if (!file) return;
          readFile(file, (text) => {
            try {
              const result = processRatesCSV(text);
              this.rates.output = result.js;
              this.rates.meta = result.meta;
              this.rates.error = '';
            } catch (err) {
              this.rates.error = 'Error: ' + err.message;
              this.rates.output = '';
              this.rates.meta = '';
            }
          });
        },

        handleZonesFile(e) {
          const file = e.target.files[0];
          if (!file) return;
          readFile(file, (text) => {
            try {
              const result = processZonesCSV(text);
              this.zones.output = result.js;
              this.zones.meta = result.meta;
              this.zones.error = '';
            } catch (err) {
              this.zones.error = 'Error: ' + err.message;
              this.zones.output = '';
              this.zones.meta = '';
            }
          });
        },

        reset() {
          this.tab = 'rates';
          this.rates = { output: '', meta: '', error: '', copied: false };
          this.zones = { output: '', meta: '', error: '', copied: false };
          document.getElementById('rates-file').value = '';
          document.getElementById('zones-file').value = '';
        },

        copy(section) {
          navigator.clipboard.writeText(section.output).then(() => {
            section.copied = true;
            setTimeout(() => { section.copied = false; }, 2000);
          });
        },
      };
    }

    function readFile(file, cb) {
      const reader = new FileReader();
      reader.onload = (ev) => cb(ev.target.result);
      reader.readAsText(file);
    }

    // ── Rates CSV processor ──────────────────────────────────────────────────
    // Handles two formats:
    //
    // Single-zone (e.g. "Media Mail.csv"):
    //   Row 0:  <name>,...,<effective date>,...
    //   Row N:  Weight Not Over (lbs),Single Piece   ← header
    //   Row N+1+: <maxWeightLbs>,<rate>
    //   Output: tiers array of [maxWeightLbs, rate]
    //
    // Multi-zone (e.g. "PM Retail.csv", "USPS Ground Advantage Retail.csv"):
    //   Row 0:  <name>,...,<effective date>,...
    //   Row N:  Weight Not Over (lbs|ounces),Zones,...   ← header; unit in parens
    //   Row N+1: ,Zone 1,Zone 2,...,Zone 9              ← zone header
    //   Row N+2+: <maxWeight>,<z1rate>,<z2rate>,...     ← data
    //   Ounce weights are converted to lbs (oz / 16). Multiple Weight Not Over
    //   sections are supported (Ground Advantage has ounces then pounds).
    //   Output: tiers array of [maxWeightLbs, zone1Rate, ..., zoneNRate]
    function processRatesCSV(text) {
      const lines = normalizeLines(text);

      // Row 0: name from col 0, date from first cell matching M/D/YYYY pattern
      const metaRow = parseCSVRow(lines[0] || '');
      const name = metaRow[0]?.trim() || 'rates';
      const effectiveDate = metaRow.map(c => c.trim()).find(c => /^\d+\/\d+\/\d+$/.test(c)) || '';

      // Find the first "Weight Not Over" row
      let firstWeightIdx = -1;
      for (let i = 1; i < lines.length; i++) {
        if (/weight not over/i.test(lines[i])) { firstWeightIdx = i; break; }
      }
      if (firstWeightIdx === -1) throw new Error('Could not find a "Weight Not Over" header row.');

      // Detect format: if the row after the weight header has "Zone N" cells → multi-zone
      const afterWeightHeader = parseCSVRow(lines[firstWeightIdx + 1] || '');
      const zoneColStart = afterWeightHeader.findIndex(c => /^zone\s*\d+$/i.test(c.trim()));

      const varName = toCamelCase(name) + 'Rates';
      const fnName = 'get' + capitalize(toCamelCase(name)) + 'Rate';

      // ── Single-zone ──────────────────────────────────────────────────────────
      if (zoneColStart === -1) {
        const tiers = [];
        for (let i = firstWeightIdx + 1; i < lines.length; i++) {
          const parts = parseCSVRow(lines[i].trim());
          const maxWeight = parseFloat(parts[0]);
          const rate = parseFloat(parts[1]);
          if (!isNaN(maxWeight) && !isNaN(rate)) tiers.push([maxWeight, rate]);
        }
        if (tiers.length === 0) throw new Error('No valid weight/rate rows found.');

        const tiersStr = tiers.map(([w, r]) => `    [${w}, ${r}]`).join(',\n');
        const js =
`const ${varName} = {
  name: ${JSON.stringify(name)},
  effectiveDate: ${JSON.stringify(effectiveDate)},
  // [maxWeightLbs, rate] — find first entry where weight <= maxWeightLbs
  tiers: [
${tiersStr}
  ],
};

function ${fnName}(weightLbs) {
  const tier = ${varName}.tiers.find(([max]) => weightLbs <= max);
  return tier ? tier[1] : null;
}`;
        const meta = `${name}${effectiveDate ? ' — effective ' + effectiveDate : ''} — ${tiers.length} weight tiers`;
        return { js, meta };
      }

      // ── Multi-zone ───────────────────────────────────────────────────────────
      // Collect zone numbers from the first zone header row
      const zones = afterWeightHeader
        .map(c => c.trim())
        .filter(c => /^zone\s*\d+$/i.test(c))
        .map(c => parseInt(c.replace(/\D/g, ''), 10));

      // Scan from the first Weight Not Over row; track current unit across sections
      const tiers = [];
      let currentUnit = 'lbs';
      let i = firstWeightIdx;

      while (i < lines.length) {
        const line = lines[i];

        if (/weight not over/i.test(line)) {
          // Extract unit from e.g. "Weight Not Over (ounces)" or "Weight Not Over (Lbs)"
          const unitMatch = line.match(/\(([^)]+)\)/i);
          const unitStr = (unitMatch ? unitMatch[1] : '').toLowerCase();
          currentUnit = (unitStr.includes('oz') || unitStr.includes('ounce')) ? 'oz' : 'lbs';

          // Skip the zone header row if present after this weight header
          const nextRow = parseCSVRow(lines[i + 1] || '');
          const hasZoneHeader = nextRow.some(c => /^zone\s*\d+$/i.test(c.trim()));
          i += hasZoneHeader ? 2 : 1;
          continue;
        }

        const row = parseCSVRow(line);
        const weightRaw = parseFloat(row[0]);
        if (!isNaN(weightRaw)) {
          const weightLbs = currentUnit === 'oz'
            ? parseFloat((weightRaw / 16).toFixed(7))
            : weightRaw;
          const rates = zones.map((_, idx) => parseFloat(row[zoneColStart + idx]));
          if (rates.every(r => !isNaN(r))) tiers.push([weightLbs, ...rates]);
        }

        i++;
      }

      if (tiers.length === 0) throw new Error('No valid weight/rate rows found.');

      const zonesStr = `[${zones.join(', ')}]`;
      const tiersStr = tiers.map(t => `    [${t.join(', ')}]`).join(',\n');
      const lastZone = zones[zones.length - 1];

      const js =
`const ${varName} = {
  name: ${JSON.stringify(name)},
  effectiveDate: ${JSON.stringify(effectiveDate)},
  zones: ${zonesStr},
  // [maxWeightLbs, zone1Rate, ..., zone${lastZone}Rate]
  tiers: [
${tiersStr}
  ],
};

function ${fnName}(weightLbs, zone) {
  const tier = ${varName}.tiers.find(([max]) => weightLbs <= max);
  if (!tier) return null;
  const idx = ${varName}.zones.indexOf(zone);
  return idx !== -1 ? tier[idx + 1] : null;
}`;

      const meta = `${name}${effectiveDate ? ' — effective ' + effectiveDate : ''} — ${tiers.length} weight tiers × ${zones.length} zones`;
      return { js, meta };
    }

    // ── Zones CSV processor ──────────────────────────────────────────────────
    // Expected format (USPS zone chart export):
    //   Row 0:  ZIP Code,Zone   ← header is row 0, no metadata before it
    //   Row 1+: <zip-or-range>,<zone>
    //
    // ZIP column values are either a plain 3-digit prefix ("005") or a range
    // using "---" as separator ("006---009"), or occasionally a longer value
    // like "96700" where the first 3 digits are used as the prefix.
    // Ranges are expanded into individual prefix entries.
    function processZonesCSV(text) {
      const lines = normalizeLines(text);

      // Find the header row containing "zip" and "zone" (may be row 0)
      let zipCol = -1, zoneCol = -1, dataStart = -1;
      for (let i = 0; i < lines.length; i++) {
        const row = parseCSVRow(lines[i]).map(c => c.trim().toLowerCase());
        const zi = row.findIndex(c => c.includes('zip'));
        const zo = row.findIndex(c => c === 'zone' || c.startsWith('zone'));
        if (zi !== -1 && zo !== -1) {
          zipCol = zi;
          zoneCol = zo;
          dataStart = i + 1;
          break;
        }
      }
      if (dataStart === -1) throw new Error('Could not find a header row with "ZIP" and "Zone" columns.');

      // Build prefix → zone map, expanding ranges like "006---009"
      const zones = {};
      for (let i = dataStart; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const row = parseCSVRow(line);
        const zipRaw = row[zipCol]?.trim();
        const zoneRaw = row[zoneCol]?.trim();
        if (!zipRaw || !zoneRaw) continue;
        const zone = parseInt(zoneRaw, 10);
        if (isNaN(zone)) continue;

        const rangeMatch = zipRaw.match(/^(\d+)-{2,}(\d+)$/);
        if (rangeMatch) {
          const start = parseInt(rangeMatch[1], 10);
          const end = parseInt(rangeMatch[2], 10);
          for (let n = start; n <= end; n++) {
            zones[String(n).padStart(3, '0')] = zone;
          }
        } else {
          // Single value: use first 3 digits as prefix
          zones[zipRaw.padStart(3, '0').slice(0, 3)] = zone;
        }
      }
      if (Object.keys(zones).length === 0) throw new Error('No valid ZIP/zone rows found.');

      const zonesStr = Object.entries(zones)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([prefix, zone]) => `    ${JSON.stringify(prefix)}: ${zone}`)
        .join(',\n');

      const js =
`const uspsZones = {
  // 3-digit dest ZIP prefix → USPS zone number
  zones: {
${zonesStr}
  },
};

function getZone(destZip) {
  const prefix = String(destZip).padStart(5, '0').slice(0, 3);
  return uspsZones.zones[prefix] ?? null;
}`;

      const meta = `USPS zones — ${Object.keys(zones).length} destination prefixes`;
      return { js, meta };
    }

    // ── Shared helpers ───────────────────────────────────────────────────────

    function normalizeLines(text) {
      return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    }

    // Minimal RFC-4180-compatible single-row CSV parser
    function parseCSVRow(line) {
      const result = [];
      let field = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') { field += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(field);
          field = '';
        } else {
          field += ch;
        }
      }
      result.push(field);
      return result;
    }

    function toCamelCase(str) {
      const camel = str.trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+([a-z0-9])/g, (_, ch) => ch.toUpperCase());
      return /^[0-9]/.test(camel) ? '_' + camel : camel;
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }
  </script>
</body>
</html>
