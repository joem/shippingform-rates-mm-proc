<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rates CSV → JS</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1.25rem;
      color: #222;
    }
    h1 { font-size: 1.25rem; margin-bottom: .25rem; }
    h2 {
      font-size: 1rem;
      margin: 2rem 0 .75rem;
      padding-bottom: .35rem;
      border-bottom: 1px solid #ddd;
    }
    label { display: block; font-weight: 600; margin-bottom: .4rem; }
    input[type="file"] { display: block; margin-bottom: 1rem; }
    .error {
      color: #c00;
      background: #fff0f0;
      border: 1px solid #fcc;
      padding: .5rem .75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    .meta {
      font-size: .875rem;
      color: #555;
      margin-bottom: .5rem;
    }
    textarea {
      width: 100%;
      height: 420px;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: .8125rem;
      line-height: 1.5;
      padding: .6rem .75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    textarea.zones { height: 300px; }
    .actions { margin-top: .6rem; display: flex; gap: .5rem; align-items: center; }
    button {
      padding: .4rem .9rem;
      font-size: .875rem;
      cursor: pointer;
      border: 1px solid #999;
      border-radius: 4px;
      background: #f5f5f5;
    }
    button:hover { background: #e8e8e8; }
    .copied { color: #080; font-size: .875rem; }
    .hint { font-size: .8rem; color: #777; margin: -.5rem 0 .75rem; }
  </style>
</head>
<body x-data="app()">
  <h1>Rates CSV → JS</h1>

  <!-- ── Rates section ── -->
  <h2>Shipping Rates</h2>
  <p class="hint">e.g. "Media Mail.csv" — weight tiers with a single rate per tier</p>
  <div>
    <label for="rates-file">Select rates CSV file:</label>
    <input id="rates-file" type="file" accept=".csv" @change="handleRatesFile($event)">
  </div>
  <div class="error" x-show="rates.error" x-text="rates.error"></div>
  <template x-if="rates.output">
    <div>
      <p class="meta" x-text="rates.meta"></p>
      <textarea readonly :value="rates.output"></textarea>
      <div class="actions">
        <button @click="copy(rates)">Copy to clipboard</button>
        <span class="copied" x-show="rates.copied">Copied!</span>
      </div>
    </div>
  </template>

  <!-- ── Zones section ── -->
  <h2>USPS Zones</h2>
  <p class="hint">e.g. "usps-zones.csv" — dest ZIP prefix → zone number, keyed by origin prefix</p>
  <div>
    <label for="zones-file">Select zones CSV file:</label>
    <input id="zones-file" type="file" accept=".csv" @change="handleZonesFile($event)">
  </div>
  <div class="error" x-show="zones.error" x-text="zones.error"></div>
  <template x-if="zones.output">
    <div>
      <p class="meta" x-text="zones.meta"></p>
      <textarea class="zones" readonly :value="zones.output"></textarea>
      <div class="actions">
        <button @click="copy(zones)">Copy to clipboard</button>
        <span class="copied" x-show="zones.copied">Copied!</span>
      </div>
    </div>
  </template>

  <script>
    function app() {
      return {
        rates: { output: '', meta: '', error: '', copied: false },
        zones: { output: '', meta: '', error: '', copied: false },

        handleRatesFile(e) {
          const file = e.target.files[0];
          if (!file) return;
          readFile(file, (text) => {
            try {
              const result = processRatesCSV(text);
              this.rates.output = result.js;
              this.rates.meta = result.meta;
              this.rates.error = '';
            } catch (err) {
              this.rates.error = 'Error: ' + err.message;
              this.rates.output = '';
              this.rates.meta = '';
            }
          });
        },

        handleZonesFile(e) {
          const file = e.target.files[0];
          if (!file) return;
          readFile(file, (text) => {
            try {
              const result = processZonesCSV(text);
              this.zones.output = result.js;
              this.zones.meta = result.meta;
              this.zones.error = '';
            } catch (err) {
              this.zones.error = 'Error: ' + err.message;
              this.zones.output = '';
              this.zones.meta = '';
            }
          });
        },

        copy(section) {
          navigator.clipboard.writeText(section.output).then(() => {
            section.copied = true;
            setTimeout(() => { section.copied = false; }, 2000);
          });
        },
      };
    }

    function readFile(file, cb) {
      const reader = new FileReader();
      reader.onload = (ev) => cb(ev.target.result);
      reader.readAsText(file);
    }

    // ── Rates CSV processor ──────────────────────────────────────────────────
    // Expected format:
    //   Row 0:  <name>,,,<status>,,<effective date>,,
    //   Row 1:  (blank)
    //   Row 2:  Weight Not Over (lbs),Single Piece
    //   Row 3+: <maxWeightLbs>,<rate>
    function processRatesCSV(text) {
      const lines = normalizeLines(text);

      const metaRow = parseCSVRow(lines[0] || '');
      const name = metaRow[0]?.trim() || 'rates';
      const effectiveDate = metaRow[5]?.trim() || '';

      let dataStart = -1;
      for (let i = 1; i < lines.length; i++) {
        if (lines[i].toLowerCase().includes('weight')) {
          dataStart = i + 1;
          break;
        }
      }
      if (dataStart === -1) throw new Error('Could not find a header row containing "Weight".');

      const tiers = [];
      for (let i = dataStart; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const parts = parseCSVRow(line);
        const maxWeight = parseFloat(parts[0]);
        const rate = parseFloat(parts[1]);
        if (!isNaN(maxWeight) && !isNaN(rate)) tiers.push([maxWeight, rate]);
      }
      if (tiers.length === 0) throw new Error('No valid weight/rate rows found.');

      const varName = toCamelCase(name) + 'Rates';
      const fnName = 'get' + capitalize(toCamelCase(name)) + 'Rate';
      const tiersStr = tiers.map(([w, r]) => `    [${w}, ${r}]`).join(',\n');

      const js =
`const ${varName} = {
  name: ${JSON.stringify(name)},
  effectiveDate: ${JSON.stringify(effectiveDate)},
  // [maxWeightLbs, rate] — find first entry where weight <= maxWeightLbs
  tiers: [
${tiersStr}
  ],
};

function ${fnName}(weightLbs) {
  const tier = ${varName}.tiers.find(([max]) => weightLbs <= max);
  return tier ? tier[1] : null;
}`;

      const meta = `${name}${effectiveDate ? ' — effective ' + effectiveDate : ''} — ${tiers.length} weight tiers`;
      return { js, meta };
    }

    // ── Zones CSV processor ──────────────────────────────────────────────────
    // Expected format (USPS zone chart export):
    //   Row 0:  Local Zone Chart: <originPrefix>,,   (or similar phrasing)
    //   Row 1:  (blank)
    //   Row 2:  Dest ZIP Code Prefix,Zone,...
    //   Row 3+: <3-digit prefix>,<zone number>,...
    //
    // Generates an object keyed by 3-digit dest ZIP prefix → zone number.
    // The lookup function accepts a full 5-digit ZIP and extracts the prefix.
    function processZonesCSV(text) {
      const lines = normalizeLines(text);

      // Extract origin prefix from row 0 (first 3-digit number found)
      const metaStr = parseCSVRow(lines[0] || '')[0]?.trim() || '';
      const originMatch = metaStr.match(/\b(\d{3})\b/);
      const originPrefix = originMatch ? originMatch[1] : '';

      // Find header row with both a "dest" column and a "zone" column
      let destCol = -1, zoneCol = -1, dataStart = -1;
      for (let i = 1; i < lines.length; i++) {
        const row = parseCSVRow(lines[i]).map(c => c.trim().toLowerCase());
        const di = row.findIndex(c => c.includes('dest'));
        const zi = row.findIndex(c => c === 'zone' || c.startsWith('zone'));
        if (di !== -1 && zi !== -1) {
          destCol = di;
          zoneCol = zi;
          dataStart = i + 1;
          break;
        }
      }
      if (dataStart === -1) throw new Error('Could not find a header row with "Dest" and "Zone" columns.');

      // Build dest-prefix → zone map; dest values may be 3-digit strings or full ZIPs
      const zones = {};
      for (let i = dataStart; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const row = parseCSVRow(line);
        const destRaw = row[destCol]?.trim();
        const zoneRaw = row[zoneCol]?.trim();
        if (!destRaw || !zoneRaw) continue;
        // Accept 3-digit prefix directly or derive from 5-digit ZIP
        const prefix = /^\d{3}$/.test(destRaw)
          ? destRaw
          : /^\d{5}/.test(destRaw) ? destRaw.slice(0, 3) : null;
        const zone = parseInt(zoneRaw, 10);
        if (prefix && !isNaN(zone)) zones[prefix] = zone;
      }
      if (Object.keys(zones).length === 0) throw new Error('No valid dest/zone rows found.');

      const suffix = originPrefix || 'Unknown';
      const varName = 'uspsZones' + suffix;

      // Emit entries sorted numerically by prefix for readability
      const zonesStr = Object.entries(zones)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([dest, zone]) => `    ${JSON.stringify(dest)}: ${zone}`)
        .join(',\n');

      const js =
`const ${varName} = {
  originPrefix: ${JSON.stringify(originPrefix)},
  // 3-digit dest ZIP prefix → USPS zone number
  zones: {
${zonesStr}
  },
};

function getZone${suffix}(destZip) {
  const prefix = String(destZip).padStart(5, '0').slice(0, 3);
  return ${varName}.zones[prefix] ?? null;
}`;

      const meta = `Origin prefix: ${originPrefix || 'unknown'} — ${Object.keys(zones).length} destination zones`;
      return { js, meta };
    }

    // ── Shared helpers ───────────────────────────────────────────────────────

    function normalizeLines(text) {
      return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    }

    // Minimal RFC-4180-compatible single-row CSV parser
    function parseCSVRow(line) {
      const result = [];
      let field = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') { field += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(field);
          field = '';
        } else {
          field += ch;
        }
      }
      result.push(field);
      return result;
    }

    function toCamelCase(str) {
      const camel = str.trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+([a-z0-9])/g, (_, ch) => ch.toUpperCase());
      return /^[0-9]/.test(camel) ? '_' + camel : camel;
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }
  </script>
</body>
</html>
